<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    button, input {
      padding: 8px;
      font-size: 16px;
      margin-left: 5px;
    }

    .timer {
      position: relative;
      width: 320px;
      height: 320px;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
    }

    .bg {
      stroke: rgba(255,255,255,0.1);
      stroke-width: 18;
    }

    /* ✅ FIXED: removed drop-shadow */
    .progress {
      stroke: white;
      stroke-width: 18;
      stroke-linecap: round;
    }

    #time {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: bold;
      text-shadow: 0 0 25px rgba(255,255,255,0.9);
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="timer" id="timer">
  <svg width="320" height="320">
    <circle class="bg" cx="160" cy="160" r="140"></circle>
    <circle class="progress" cx="160" cy="160" r="140"
      stroke-dasharray="879"
      stroke-dashoffset="0"
      id="progressCircle">
    </circle>
  </svg>
  <div id="time">3.0</div>
</div>

<script>
  const timeEl = document.getElementById("time");
  const progress = document.getElementById("progressCircle");
  const timer = document.getElementById("timer");

  const radius = 140;
  const circumference = 2 * Math.PI * radius;

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {

    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      timer.style.display = "block";
      timeEl.textContent = "✔";
      return;
    }

    currentRep++;

    // SHOW TIMER
    timer.style.display = "block";
    document.body.style.background = "black";

    await countdown(3000);

    //await sleep(500 + Math.random() * 1500);

    const isGreen = Math.random() > 0.5;

    // HIDE TIMER → FULL SCREEN COLOR
    timer.style.display = "none";
    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";

    if (navigator.vibrate) navigator.vibrate(200);

    await sleep(1000);

    // RESET
    document.body.style.background = "black";
    await sleep(4000);

    runRound();
  }

  function countdown(duration) {
    return new Promise(resolve => {

      let startTime = null;

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;

        const elapsed = timestamp - startTime;
        const remaining = Math.max(duration - elapsed, 0);

        // aggressive easing
        const progressPercent = Math.pow(elapsed / duration, 1.4);

        // update number
        timeEl.textContent = (remaining / 1000).toFixed(1);

        // update ring
        progress.style.strokeDasharray = circumference;
        progress.style.strokeDashoffset = circumference * progressPercent;

        if (remaining > 0) {
          requestAnimationFrame(animate);
        } else {
          timeEl.textContent = "0.0";
          resolve();
        }
      }

      requestAnimationFrame(animate);
    });
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
