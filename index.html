<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light Trainer</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    input {
      width: 60px;
      padding: 6px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    #text {
      font-size: 140px;
      font-weight: bold;
      text-align: center;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.4s ease;
      text-shadow: 0 0 25px rgba(255,255,255,0.9);
    }

    .show {
      opacity: 1;
      transform: scale(1.3);
    }

    .hide {
      opacity: 0;
      transform: scale(0.5);
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="text">▶</div>

<script>
  const text = document.getElementById("text");

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {
    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      text.textContent = "✔";
      text.classList.add("show");
      return;
    }

    currentRep++;

    await countdown(3);

    // small random delay before signal (game feel)
    await sleep(500 + Math.random() * 1500);

    const isGreen = Math.random() > 0.5;

    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";

    // optional vibration
    if (navigator.vibrate) navigator.vibrate(200);

    text.classList.remove("show");
    text.textContent = "";

    await sleep(1500 + Math.random() * 1500);

    document.body.style.background = "black";
    await sleep(800);

    runRound();
  }

  async function countdown(n) {
    for (let i = n; i > 0; i--) {
      document.body.style.background = "black";

      text.textContent = i;
      text.classList.remove("hide");
      text.classList.add("show");

      // quick flash effect
      document.body.style.background = "#111";
      await sleep(100);
      document.body.style.background = "black";

      await sleep(500);

      text.classList.remove("show");
      text.classList.add("hide");

      await sleep(300);
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
