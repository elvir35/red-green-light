<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Advanced Countdown</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .timer {
      position: relative;
      width: 260px;
      height: 260px;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
      stroke-width: 12;
    }

    .bg {
      stroke: rgba(255,255,255,0.15);
    }

    .progress {
      stroke: white;
      stroke-linecap: round;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.7));
    }

    #time {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255,255,255,0.9);
    }

    button {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button onclick="start()">Start</button>

<div class="timer">
  <svg width="260" height="260">
    <circle class="bg" cx="130" cy="130" r="110"></circle>
    <circle class="progress" cx="130" cy="130" r="110"
      stroke-dasharray="691"
      stroke-dashoffset="0"
      id="progressCircle">
    </circle>
  </svg>
  <div id="time">3.0</div>
</div>

<script>
  const timeEl = document.getElementById("time");
  const progress = document.getElementById("progressCircle");

  const radius = 110;
  const circumference = 2 * Math.PI * radius;

  let duration = 3000; // ms (3 seconds)

  function start() {
    let startTime = null;

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;

      const elapsed = timestamp - startTime;
      const remaining = Math.max(duration - elapsed, 0);

      // update number (with 1 decimal)
      timeEl.textContent = (remaining / 1000).toFixed(1);

      // update ring
      const progressPercent = elapsed / duration;
      const offset = circumference * progressPercent;
      progress.style.strokeDashoffset = offset;

      if (remaining > 0) {
        requestAnimationFrame(animate);
      } else {
        timeEl.textContent = "0.0";
      }
    }

    // reset ring
    progress.style.strokeDasharray = circumference;
    progress.style.strokeDashoffset = 0;

    requestAnimationFrame(animate);
  }
</script>

</body>
</html>
