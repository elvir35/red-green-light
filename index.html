<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    #number {
      font-size: 140px;
      font-weight: bold;
      text-shadow: 0 0 30px rgba(255,255,255,0.9);
    }

    button {
      padding: 8px 12px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    input {
      width: 60px;
      padding: 6px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="number">▶</div>

<script>
  const number = document.getElementById("number");

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {

  if (currentRep >= totalReps) {
    document.body.style.background = "black";
    number.textContent = "✔";
    return;
  }

  currentRep++;

  await countdown(3);

  // small random delay before signal (keeps players honest)
  await sleep(500 + Math.random() * 1500);

  const isGreen = Math.random() > 0.5;

  // 🔴🟢 SHOW SIGNAL
  document.body.style.background = isGreen ? "#00ff00" : "#ff0000";
  number.textContent = "";

  // ⏱ hold signal (reaction phase)
  await sleep(2000); // adjust: 1500–3000

  // ⚫ RESET PHASE (goalkeeper returns)
  document.body.style.background = "black";

  // 👇 THIS is the important new part
  await sleep(2500); // adjust: 2000–4000 depending on drill

  runRound();
}

  async function countdown(n) {
    for (let i = n; i > 0; i--) {
      document.body.style.background = "black";
      number.textContent = i;
      await sleep(1000);
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
