<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light Trainer</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    input {
      width: 60px;
      padding: 6px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    .timer {
      position: relative;
      width: 220px;
      height: 220px;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
      stroke-width: 14;
    }

    .bg {
      stroke: rgba(255,255,255,0.15);
    }

    .progress {
      stroke: white;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.7));
    }

    #number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 90px;
      font-weight: bold;
      text-shadow: 0 0 25px rgba(255,255,255,0.9);
      transition: transform 0.2s ease;
    }

    .pulse {
      transform: translate(-50%, -50%) scale(1.2);
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="timer">
  <svg width="220" height="220">
    <circle class="bg" cx="110" cy="110" r="95"></circle>
    <circle class="progress" cx="110" cy="110" r="95"
      stroke-dasharray="597"
      stroke-dashoffset="0"
      id="progressCircle">
    </circle>
  </svg>
  <div id="number">3</div>
</div>

<script>
  const number = document.getElementById("number");
  const progress = document.getElementById("progressCircle");

  const circumference = 2 * Math.PI * 95;

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {
    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      number.textContent = "✔";
      return;
    }

    currentRep++;

    await countdown(3);

    await sleep(500 + Math.random() * 1500);

    const isGreen = Math.random() > 0.5;
    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";

    if (navigator.vibrate) navigator.vibrate(200);

    await sleep(1500 + Math.random() * 1500);

    document.body.style.background = "black";
    await sleep(800);

    runRound();
  }

  async function countdown(n) {
    for (let i = n; i > 0; i--) {

      number.textContent = i;

      // pulse effect
      number.classList.add("pulse");
      setTimeout(() => number.classList.remove("pulse"), 200);

      // optional sound (uncomment if you want)
      // new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();

      // reset ring instantly
      progress.style.transition = "none";
      progress.style.strokeDasharray = circumference;
      progress.style.strokeDashoffset = 0;

      await sleep(50);

      // animate ring
      progress.style.transition = "stroke-dashoffset 1s linear";
      progress.style.strokeDashoffset = circumference;

      await sleep(1000);
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
