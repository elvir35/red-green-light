<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    #text {
      font-size: 120px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
</div>

<div id="text">▶</div>

<script>
  const text = document.getElementById("text");

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {
    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      text.textContent = "✔";
      return;
    }

    currentRep++;

    await countdown(3);

    const isGreen = Math.random() > 0.5;

    // 🔥 THIS is the key line
    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";
    text.textContent = "";

    await sleep(2000);

    document.body.style.background = "black";
    await sleep(800);

    runRound();
  }

  async function countdown(n) {
    for (let i = n; i > 0; i--) {
      document.body.style.background = "black";
      text.textContent = i;
      await sleep(1000);
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>

</body>
</html>
