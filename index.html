<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    button, input {
      padding: 8px;
      font-size: 16px;
      margin-left: 5px;
    }

    .timer {
      position: relative;
      width: 320px;
      height: 320px;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
    }

    .bg {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 18;
    }

    .progress {
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke 0.2s linear;
    }

    #time {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 80px;
      font-weight: bold;
      text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 25px rgba(255,255,255,0.6);
      transition: transform 0.1s ease;
    }

    /* 🔥 pulse effect */
    .pulse {
      transform: translate(-50%, -50%) scale(1.2);
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="timer" id="timer">
  <svg width="320" height="320">
    <circle class="bg" cx="160" cy="160" r="140"></circle>
    <circle class="progress" cx="160" cy="160" r="140"
      stroke-dasharray="879"
      stroke-dashoffset="0"
      id="progressCircle">
    </circle>
  </svg>
  <div id="time">3.0</div>
</div>

<script>
  const timeEl = document.getElementById("time");
  const progress = document.getElementById("progressCircle");
  const timer = document.getElementById("timer");

  const radius = 140;
  const circumference = 2 * Math.PI * radius;

  let totalReps = 5;
  let currentRep = 0;

  async function start() {
    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {

    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      timer.style.display = "block";
      timeEl.textContent = "✔";
      return;
    }

    currentRep++;

    timer.style.display = "block";
    document.body.style.background = "black";

    await countdown(3000);

    await sleep(500 + Math.random() * 1500);

    const isGreen = Math.random() > 0.5;

    timer.style.display = "none";
    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";

    if (navigator.vibrate) navigator.vibrate(200);

    await sleep(1000);

    document.body.style.background = "black";
    await sleep(4000);

    runRound();
  }

  function countdown(duration) {
    return new Promise(resolve => {

      let startTime = null;
      let beepPlayed = false;

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;

        const elapsed = timestamp - startTime;
        const remaining = Math.max(duration - elapsed, 0);
        const progressPercent = elapsed / duration;

        // 🎯 number
        timeEl.textContent = (remaining / 1000).toFixed(1);

        // 🎨 dynamic color (green → yellow → red)
        if (progressPercent < 0.5) {
          progress.style.stroke = "#00ff00";
        } else if (progressPercent < 0.8) {
          progress.style.stroke = "#ffaa00";
        } else {
          progress.style.stroke = "#ff0000";
        }

        // 💥 pulse in last 0.3s
        if (remaining < 300) {
          timeEl.classList.add("pulse");
        } else {
          timeEl.classList.remove("pulse");
        }

        // 🔊 beep at 0
        if (!beepPlayed && remaining <= 50) {
          beepPlayed = true;
          playBeep();
        }

        // ring progress
        progress.style.strokeDasharray = circumference;
        progress.style.strokeDashoffset = circumference * progressPercent;

        if (remaining > 0) {
          requestAnimationFrame(animate);
        } else {
          timeEl.textContent = "0.0";
          resolve();
        }
      }

      requestAnimationFrame(animate);
    });
  }

  function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = 1000;
    osc.type = "sine";

    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);

    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
