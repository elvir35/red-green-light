<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Red Green Light</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    button, input {
      padding: 8px;
      font-size: 16px;
      margin-left: 5px;
    }

    .timer {
      position: relative;
      width: 320px;
      height: 320px;
    }

    svg {
      transform: rotate(-90deg);
    }

    .bg {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 18;
      fill: none;
    }

    .progress {
      stroke-width: 18;
      stroke-linecap: round;
      fill: none;
    }

    #time {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 80px;
      font-weight: bold;
      text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 25px rgba(255,255,255,0.6);
      transition: transform 0.1s ease;
    }

    .pulse {
      transform: translate(-50%, -50%) scale(1.2);
    }
  </style>
</head>

<body>

<div id="controls">
  Reps: <input id="reps" type="number" value="5" min="1">
  <button onclick="start()">Start</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="timer" id="timer">
  <svg width="320" height="320">
    <circle class="bg" cx="160" cy="160" r="140"></circle>
    <circle class="progress" cx="160" cy="160" r="140"
      stroke-dasharray="879"
      stroke-dashoffset="0"
      id="progressCircle">
    </circle>
  </svg>
  <div id="time">3.0</div>
</div>

<script>
  const timeEl = document.getElementById("time");
  const progress = document.getElementById("progressCircle");
  const timer = document.getElementById("timer");

  const radius = 140;
  const circumference = 2 * Math.PI * radius;

  let totalReps = 5;
  let currentRep = 0;

  // 🔒 Wake Lock
  let wakeLock = null;

  async function enableWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request("screen");

      document.addEventListener("visibilitychange", async () => {
        if (wakeLock !== null && document.visibilityState === "visible") {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      });

    } catch (err) {
      console.log("Wake lock failed:", err);
    }
  }

  async function start() {
    await enableWakeLock();

    totalReps = parseInt(document.getElementById("reps").value) || 5;
    currentRep = 0;
    runRound();
  }

  async function runRound() {
    if (currentRep >= totalReps) {
      document.body.style.background = "black";
      timer.style.display = "block";
      timeEl.textContent = "✔";
      return;
    }

    currentRep++;

    timer.style.display = "block";
    document.body.style.background = "black";

    await countdown(3000);

    await sleep(500 + Math.random() * 1500);

    const isGreen = Math.random() > 0.5;

    timer.style.display = "none";
    document.body.style.background = isGreen ? "#00ff00" : "#ff0000";

    if (navigator.vibrate) navigator.vibrate(200);

    await sleep(1000);

    document.body.style.background = "black";
    await sleep(4000);

    runRound();
  }

  function countdown(duration) {
    return new Promise(resolve => {

      let startTime = null;
      let lastSecond = 3;
      let endBeepPlayed = false;

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;

        const elapsed = timestamp - startTime;
        const remaining = Math.max(duration - elapsed, 0);
        const seconds = Math.ceil(remaining / 1000);

        const progressPercent = elapsed / duration;

        // number
        timeEl.textContent = (remaining / 1000).toFixed(1);

        // color shift
        if (progressPercent < 0.5) {
          progress.style.stroke = "#00ff00";
        } else if (progressPercent < 0.8) {
          progress.style.stroke = "#ffaa00";
        } else {
          progress.style.stroke = "#ff0000";
        }

        // beep every second
        if (seconds !== lastSecond && seconds > 0) {
          lastSecond = seconds;
          playBeep(1200, 0.12);
        }

        // pulse last 0.3s
        if (remaining < 300) {
          timeEl.classList.add("pulse");
        } else {
          timeEl.classList.remove("pulse");
        }

        // final beep
        if (!endBeepPlayed && remaining <= 50) {
          endBeepPlayed = true;
          playBeep(600, 0.35);
        }

        // ring
        progress.style.strokeDasharray = circumference;
        progress.style.strokeDashoffset = circumference * progressPercent;

        if (remaining > 0) {
          requestAnimationFrame(animate);
        } else {
          timeEl.textContent = "0.0";
          resolve();
        }
      }

      requestAnimationFrame(animate);
    });
  }

  function playBeep(freq, duration) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = freq;
    osc.type = "sine";

    gain.gain.setValueAtTime(0.6, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

    osc.start();
    osc.stop(ctx.currentTime + duration);
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
